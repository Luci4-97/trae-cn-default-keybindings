name: Export Trae CN Windows Keybindings

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/**'
      - 'scripts/**'

jobs:
  export-windows-keybindings:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Download Trae CN for Windows
        run: |
          Invoke-WebRequest -Uri "https://lf-cdn.trae.com.cn/obj/trae-com-cn/pkg/app/releases/stable/2.3.24299/win32/Trae%20CN-Setup-x64.exe" -OutFile "trae-setup.exe"
        shell: powershell

      - name: Install Trae CN silently
        run: |
          Start-Process -FilePath "trae-setup.exe" -ArgumentList "/S" -Wait -NoNewWindow
        shell: powershell

      - name: Verify Trae CN installation
        run: |
          $traePath = "$env:USERPROFILE\AppData\Local\Programs\Trae CN\traecli.exe"
          if (Test-Path $traePath) {
            Write-Host "Trae CN installed successfully at $traePath"
          } else {
            Write-Error "Trae CN installation failed"
            exit 1
          }
        shell: powershell

      - name: Install dependencies for keybinding extractor
        run: |
          cd scripts/get_default_keybindings
          npm install

      - name: Extract default keybindings
        run: |
          cd scripts/get_default_keybindings
          npm start
        shell: powershell

      - name: Process JSON files
        run: |
          cd scripts
          python process_json.py

      - name: Upload keybindings as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trae-windows-keybindings
          path: |
            windows.keybindings.json
            windows.negative.keybindings.json

      - name: Check for changes
        id: check-changes
        run: |
          if (git diff --name-only) {
            Write-Host "has_changes=true" >> $env:GITHUB_ENV
          } else {
            Write-Host "has_changes=false" >> $env:GITHUB_ENV
          }
        shell: powershell

      - name: Create PR if changes detected
        if: env.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          title: "Update Trae CN Windows Keybindings"
          body: "This PR updates the Trae CN Windows default keybindings. Generated automatically by GitHub Actions."
          branch: "update-windows-keybindings"
          delete-branch: true

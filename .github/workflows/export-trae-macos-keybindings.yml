name: Export Trae macOS Keybindings

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/**'
      - 'scripts/**'

jobs:
  export-macos-keybindings:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Fetch latest Trae version and download URL from API
        id: get-version
        run: |
          echo "Fetching latest version from Trae API..."
          # Use timeout and retry for robustness
          MAX_RETRIES=3
          RETRY_DELAY=5
          RESPONSE=""
          
          for ((i=1; i<=MAX_RETRIES; i++)); do
            echo "Attempt $i of $MAX_RETRIES..."
            RESPONSE=$(curl -s -L --max-time 30 "https://api.trae.ai/icube/api/v1/native/version/trae/latest")
            
            if [ -n "$RESPONSE" ] && echo "$RESPONSE" | jq . > /dev/null 2>&1; then
              echo "API call successful"
              break
            fi
            
            if [ $i -lt $MAX_RETRIES ]; then
              echo "Retrying in $RETRY_DELAY seconds..."
              sleep $RETRY_DELAY
            fi
          done
          
          if [ -z "$RESPONSE" ]; then
            echo "Error: Failed to fetch version from API after $MAX_RETRIES attempts"
            exit 1
          fi
          
          # Extract version and download URL using jq
          VERSION=$(echo "$RESPONSE" | jq -r '.data.manifest.darwin.version')
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.data.manifest.darwin.download[] | select(.region == "sg") | .intel')
          
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Error: Failed to extract version from API response"
            exit 1
          fi
          
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "Error: Failed to extract download URL from API response"
            exit 1
          fi
          
          echo "Latest Trae version: $VERSION"
          echo "Download URL: $DOWNLOAD_URL"
          echo "TRAE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_ENV

      - name: Download Trae for macOS (with retry)
        run: |
          echo "Downloading Trae version ${TRAE_VERSION}..."
          MAX_RETRIES=3
          RETRY_DELAY=10
          DOWNLOAD_SUCCESS=0
          
          for ((i=1; i<=MAX_RETRIES; i++)); do
            echo "Download attempt $i of $MAX_RETRIES..."
            
            if curl -L --max-time 120 -o trae.dmg "${DOWNLOAD_URL}"; then
              # Verify download
              if [ -f "trae.dmg" ] && [ $(stat -f%z trae.dmg) -gt 10000000 ]; then
                echo "Download successful, file size: $(stat -f%z trae.dmg) bytes"
                DOWNLOAD_SUCCESS=1
                break
              else
                echo "Downloaded file is too small or missing, removing..."
                rm -f trae.dmg
              fi
            fi
            
            if [ $i -lt $MAX_RETRIES ]; then
              echo "Waiting $RETRY_DELAY seconds before retry..."
              sleep $RETRY_DELAY
            fi
          done
          
          if [ $DOWNLOAD_SUCCESS -ne 1 ]; then
            echo "Error: Failed to download Trae after $MAX_RETRIES attempts"
            exit 1
          fi

      - name: Mount DMG and install Trae
        run: |
          echo "Mounting DMG..."
          hdiutil attach trae.dmg -quiet -mountpoint /Volumes/Trae
          
          echo "Copying Trae.app to Applications..."
          cp -R "/Volumes/Trae/Trae.app" /Applications/
          
          echo "Unmounting DMG..."
          hdiutil detach /Volumes/Trae -quiet

      - name: Verify Trae installation
        run: |
          if [ -d "/Applications/Trae.app" ]; then
            echo "Trae installed successfully"
          else
            echo "Trae installation failed"
            ls -la /Volumes/ 2>/dev/null || true
            ls -la /Applications/ | grep -i trae || true
            exit 1
          fi

      - name: Install dependencies for keybinding extractor
        run: |
          cd scripts/get_default_keybindings
          npm install

      - name: Extract default keybindings
        run: |
          cd scripts/get_default_keybindings
          npm start

      - name: Process JSON files
        run: |
          cd scripts
          python3 process_json.py

      - name: Upload keybindings as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trae-macos-keybindings
          path: |
            macos.keybindings.json
            macos.negative.keybindings.json

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --name-only; then
            echo "has_changes=true" >> $GITHUB_ENV
          else
            echo "has_changes=false" >> $GITHUB_ENV
          fi

      - name: Create PR if changes detected
        if: ${{ env.has_changes == 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          title: "Update Trae macOS Keybindings (v${{ env.TRAE_VERSION }})"
          body: "This PR updates the Trae macOS default keybindings to version ${TRAE_VERSION}. Generated automatically by GitHub Actions."
          branch: "update-macos-keybindings"
          delete-branch: true
